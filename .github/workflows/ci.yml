name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: sqlite+pysqlite:///./ci-test.db
      RATE_LIMIT_AUTH: 100/minute
      RATE_LIMIT_SCAN: 100/minute
      UPLOAD_DIR: backend/local_storage/uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt
      - name: Lint backend and ML
        run: python -m ruff check backend ml
      - name: Test backend
        run: python -m pytest backend/tests

  mobile:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Typecheck mobile
        working-directory: mobile
        run: npm run typecheck
